version: "3.8"

services:
  db:
    image: postgres:16-alphine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: afexium_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data: var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d afexium"]
      interval: 10s
      timeout: 5s
      retries: 3

  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://admin:${DB_PASSWORD@db:5432/afexium
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alphine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  postgres_data:
